spring.application.name=Master-Tyres

spring.datasource.url=jdbc:mysql://localhost:3306/${DB_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&useTimezone=true&serverTimezone=Mexico/General&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#DesactivarTomCat
spring.main.web-application-type=none
#Configurar Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#ConfigurarLimite conexiones
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.maximum-idle=1
spring.datasource.hikari.idle-timeout=20000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=15000

#Configuraciones medidas campos Nota
mastertyres.ui.nota.direccion.campoNombre.maxlength=50
mastertyres.ui.nota.direccion.campoDireccion1.maxlength=49
mastertyres.ui.nota.direccion.campoDireccion2.maxlength=74
mastertyres.ui.nota.direccion.campoRfc.maxlength=63
mastertyres.ui.nota.direccion.campoCorreo.maxlength=64
mastertyres.ui.nota.direccion.campoMarca.maxlength=34
mastertyres.ui.nota.direccion.campoModelo.maxlength=34
mastertyres.ui.nota.direccion.campoKilometros.maxlength=15

#Respaldos
app.ruta.respaldos=${user.home}/MasterTires/data/respaldos

#Supabase
supabase.url=${SUPABASE_URL}
supabase.api.key=${SUPABASE_APIKEY}
supabase.url.bucket=${SUPABASE_BUCKET}

#Modulo de configuraciones Acerca de

app.name=Master Tires App
app.company=Master Tires
app.version=v1.0.0
app.build=2026.03.16
app.ultima.actualizacion=2026.03.16






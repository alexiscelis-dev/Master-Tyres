spring.application.name=Master-Tyres

spring.datasource.url=jdbc:mysql://localhost:3306/master_tyres_db?useSSL=false&allowPublicKeyRetrieval=true&useTimezone=true&serverTimezone=Mexico/General
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#DesactivarTomCat
spring.main.web-application-type=none
#Configurar Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#ConfigurarLimite conexiones
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.maximum-idle=2
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

